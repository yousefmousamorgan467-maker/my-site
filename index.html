<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Youssef TikTok 🇪🇬</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        
        .video-container { width: 100%; height: 100%; pointer-events: none; }
        iframe { width: 100%; height: 100%; border: none; transform: scale(1.7); } /* تكبير لتناسب الطول */

        /* الأزرار الجانبية */
        .side-bar { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 100; }
        .action-item { display: flex; flex-direction: column; align-items: center; color: white; cursor: pointer; }
        .action-item i { font-size: 30px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .action-item span { font-size: 12px; font-weight: bold; }
        .liked { color: #ff0050 !important; transform: scale(1.2); transition: 0.2s; }

        /* معلومات الفيديو */
        .bottom-info { position: absolute; bottom: 30px; left: 15px; right: 70px; color: white; z-index: 90; text-align: right; }
        .username { font-weight: bold; font-size: 18px; margin-bottom: 8px; display: block; }
        .caption { font-size: 14px; line-height: 1.4; opacity: 0.9; }

        /* شاشة البدء */
        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn-play { padding: 15px 40px; background: #ff0050; border: none; border-radius: 50px; color: white; font-weight: bold; font-size: 18px; box-shadow: 0 0 20px #ff0050; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom: 30px;">YOUSSEF TIKTOK 🎬</h1>
        <button class="btn-play" onclick="startApp()">مشاهدة الميمز 🚀</button>
    </div>

    <div id="feed"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const API_KEY = 'AIzaSyDBfEkyok9JzZJ8DQCFLard7EJSglE8CAQ';
        const feed = document.getElementById('feed');
        let players = [];
        let nextToken = '';

        async function loadVideos() {
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=شورتس+مضحك+مصر&regionCode=EG&type=video&videoDuration=short&key=${API_KEY}&pageToken=${nextToken}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                nextToken = data.nextPageToken;
                data.items.forEach(item => createTikTokCard(item.id.videoId, item.snippet.title, item.snippet.channelTitle));
            } catch(e) { console.error("Quota full"); }
        }

        function createTikTokCard(id, title, channel) {
            const card = document.createElement('div');
            card.className = 'video-card';
            const pId = 'p-' + id;
            
            card.innerHTML = `
                <div class="video-container" id="${pId}"></div>
                <div class="side-bar">
                    <div class="action-item" onclick="toggleLike(this)">
                        <i class="fa-solid fa-heart"></i>
                        <span>1.5K</span>
                    </div>
                    <div class="action-item" onclick="alert('التعليقات قادمة..')">
                        <i class="fa-solid fa-comment-dots"></i>
                        <span>420</span>
                    </div>
                    <div class="action-item" onclick="shareVideo('${id}')">
                        <i class="fa-solid fa-share"></i>
                        <span>مشاركة</span>
                    </div>
                </div>
                <div class="bottom-info">
                    <span class="username">@Programmer_Youssef</span>
                    <div class="caption">${title}</div>
                </div>
            `;
            feed.appendChild(card);

            new YT.Player(pId, {
                videoId: id,
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': id, 'modestbranding': 1 },
                events: { 'onReady': (e) => {
                    players.push({ player: e.target, element: card });
                    observer.observe(card);
                }}
            });
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const p = players.find(x => x.element === entry.target);
                if (entry.isIntersecting) {
                    p.player.playVideo(); p.player.unMute();
                } else {
                    p.player.pauseVideo();
                }
            });
        }, { threshold: 0.7 });

        function toggleLike(btn) {
            const icon = btn.querySelector('i');
            const span = btn.querySelector('span');
            icon.classList.toggle('liked');
            if(icon.classList.contains('liked')) {
                span.innerText = "1.5K+1";
            } else {
                span.innerText = "1.5K";
            }
        }

        function shareVideo(id) {
            const link = `https://youtu.be/${id}`;
            navigator.clipboard.writeText(link);
            alert("تم نسخ رابط الفيديو! ابعته لأصحابك 😉");
        }

        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            loadVideos();
        }

        feed.addEventListener('scroll', () => {
            if (feed.scrollTop + feed.clientHeight >= feed.scrollHeight - 100) loadVideos();
        });
    </script>
</body>
</html>
